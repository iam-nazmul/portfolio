<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080b14"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="blobA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="80" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="80" r="360" fill="url(#blobA)"/>
  <circle cx="1120" cy="180" r="380" fill="url(#blobB)"/>

  <!-- dotted grid -->
  <g fill="#94a3b8" opacity="0.10">
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- monogram -->
  <rect x="80" y="90" width="76" height="76" rx="18" fill="url(#accent)"/>
  <text x="118" y="142" font-family="'Sora', 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">NH</text>

  <!-- availability pill -->
  <g transform="translate(80, 250)">
    <rect x="0" y="0" width="320" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="26" cy="22" r="6" fill="#34d399"/>
    <text x="46" y="29" font-family="'JetBrains Mono', monospace" font-size="16" fill="#7dd3fc" letter-spacing="1">AVAILABLE FOR OPPORTUNITIES</text>
  </g>

  <!-- name -->
  <text x="78" y="400" font-family="'Sora', 'Segoe UI', sans-serif" font-size="86" font-weight="800" fill="url(#name)" letter-spacing="-2">Md. Nazmul Hossain</text>

  <!-- title -->
  <text x="80" y="452" font-family="'JetBrains Mono', monospace" font-size="26" fill="#7dd3fc" letter-spacing="3">SENIOR FULL-STACK SOFTWARE ENGINEER</text>

  <!-- stats row -->
  <g font-family="'Sora', 'Segoe UI', sans-serif">
    <text x="80"  y="545" font-size="40" font-weight="700" fill="#ffffff">6+</text>
    <text x="80"  y="575" font-family="'JetBrains Mono', monospace" font-size="15" fill="#64748b">YEARS</text>

    <text x="280" y="545" font-size="40" font-weight="700" fill="#ffffff">50K+</text>
    <text x="280" y="575" font-family="'JetBrains Mono', monospace" font-size="15" fill="#64748b">USERS</text>

    <text x="500" y="545" font-size="40" font-weight="700" fill="#ffffff">8M+</text>
    <text x="500" y="575" font-family="'JetBrains Mono', monospace" font-size="15" fill="#64748b">REQ / MONTH</text>

    <text x="760" y="545" font-size="40" font-weight="700" fill="#ffffff">99.9%</text>
    <text x="760" y="575" font-family="'JetBrains Mono', monospace" font-size="15" fill="#64748b">UPTIME</text>
  </g>

  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
